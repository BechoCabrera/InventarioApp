<div class="assign-page">
  <mat-card>
    <mat-card-title>Asignar permisos a usuarios</mat-card-title>
    <mat-divider class="section-divider"></mat-divider>
    <mat-card-content>
      <form [formGroup]="form" (ngSubmit)="onSubmit()" class="assign-form">
        <div class="form-row">
          <mat-form-field class="field" appearance="outline">
            <mat-label>Usuario</mat-label>
            <mat-select formControlName="userId">
              <mat-option *ngFor="let u of users" [value]="u.userId">
                {{ u.username }} - {{ u.name }}
              </mat-option>
            </mat-select>
          </mat-form-field>

          <mat-form-field class="field" appearance="outline">
            <mat-label>Roles</mat-label>
            <mat-select formControlName="roleIds" multiple>
              <mat-option *ngFor="let r of roles" [value]="r.roleId">{{ r.roleName }}</mat-option>
            </mat-select>
          </mat-form-field>
        </div>

        <div class="btn-row">
          <button mat-raised-button color="primary" type="submit" [disabled]="form.invalid">
            Guardar asignación
          </button>
        </div>
      </form>
    </mat-card-content>
  </mat-card>

  <mat-card class="mt-3">
    <mat-card-title>Permisos asignados por usuario</mat-card-title>
    <mat-divider class="section-divider"></mat-divider>
    <mat-card-content>
      <table mat-table [dataSource]="usersRolesSummary" class="mat-elevation-z1 full-width-table">
      <ng-container matColumnDef="username">
        <th mat-header-cell *matHeaderCellDef>Usuario</th>
        <td mat-cell *matCellDef="let row">{{ row.username }}</td>
      </ng-container>

      <ng-container matColumnDef="name">
        <th mat-header-cell *matHeaderCellDef>Nombre</th>
        <td mat-cell *matCellDef="let row">{{ row.name }}</td>
      </ng-container>

      <ng-container matColumnDef="roles">
        <th mat-header-cell *matHeaderCellDef>Roles / permisos asignados</th>
        <td mat-cell *matCellDef="let row">{{ row.roles }}</td>
      </ng-container>

      <tr mat-header-row *matHeaderRowDef="summaryDisplayedColumns"></tr>
      <tr mat-row *matRowDef="let row; columns: summaryDisplayedColumns"></tr>
      </table>
    </mat-card-content>
  </mat-card>

  <loading-overlay *ngIf="isSummaryLoading"></loading-overlay>
</div>
