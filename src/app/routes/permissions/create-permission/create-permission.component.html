<div class="permissions-page">
  <mat-card>
    <mat-card-title>Crear permiso</mat-card-title>
    <mat-divider class="section-divider"></mat-divider>
    <mat-card-content>
      <form [formGroup]="form" (ngSubmit)="onSubmit()" class="perm-form">
        <div class="form-row">
          <mat-form-field class="field" appearance="outline">
            <mat-label>Nombre del permiso</mat-label>
            <input matInput formControlName="permissionName" />
          </mat-form-field>

          <mat-form-field class="field" appearance="outline">
            <mat-label>Descripción</mat-label>
            <input matInput formControlName="description" />
          </mat-form-field>
        </div>

        <div class="btn-row">
          <button mat-raised-button color="primary" type="submit" [disabled]="form.invalid">
            Guardar permiso
          </button>
          <button mat-stroked-button color="warn" type="button" (click)="clearForm()">
            Limpiar
          </button>
        </div>
      </form>
    </mat-card-content>
  </mat-card>

  <loading-overlay *ngIf="isLoading"></loading-overlay>

  <mat-card class="mt-3">
    <mat-card-title>Permisos registrados</mat-card-title>
    <mat-divider class="section-divider"></mat-divider>
    <mat-card-content>
      <table mat-table [dataSource]="permissions" class="mat-elevation-z1 full-width-table">
      <ng-container matColumnDef="permissionName">
        <th mat-header-cell *matHeaderCellDef> Permiso </th>
        <td mat-cell *matCellDef="let p"> {{ p.permissionName }} </td>
      </ng-container>

      <ng-container matColumnDef="description">
        <th mat-header-cell *matHeaderCellDef> Descripción </th>
        <td mat-cell *matCellDef="let p"> {{ p.description }} </td>
      </ng-container>

      <ng-container matColumnDef="actions">
        <th mat-header-cell *matHeaderCellDef> Acciones </th>
        <td mat-cell *matCellDef="let p">
          <button mat-icon-button color="primary" (click)="editPermission(p)">
            <mat-icon>edit</mat-icon>
          </button>
          <button mat-icon-button color="warn" (click)="deletePermission(p)">
            <mat-icon>delete</mat-icon>
          </button>
        </td>
      </ng-container>

      <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
      <tr mat-row *matRowDef="let row; columns: displayedColumns"></tr>
      </table>
    </mat-card-content>
  </mat-card>
</div>
