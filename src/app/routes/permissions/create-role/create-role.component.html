<div class="roles-page">
  <mat-card>
    <mat-card-title>Crear rol</mat-card-title>
    <mat-divider class="section-divider"></mat-divider>
    <mat-card-content>
      <form [formGroup]="form" (ngSubmit)="onSubmit()" class="role-form">
      <div class="form-row">
        <mat-form-field class="field" appearance="outline">
          <mat-label>Nombre del rol</mat-label>
          <input matInput formControlName="roleName" />
        </mat-form-field>

        <mat-form-field class="field" appearance="outline">
          <mat-label>Descripción</mat-label>
          <input matInput formControlName="description" />
        </mat-form-field>
      </div>

      <div class="form-row">
        <mat-form-field class="field" appearance="outline">
          <mat-label>Permisos del rol</mat-label>
          <mat-select formControlName="permissionIds" multiple>
            <mat-select-trigger>
              {{ form.value.permissionIds?.length || 0 }} permisos seleccionados
            </mat-select-trigger>
            <mat-option *ngFor="let p of permissions" [value]="p.permissionId">
              {{ p.permissionName }}
            </mat-option>
          </mat-select>
        </mat-form-field>
      </div>

      <div class="btn-row">
        <button mat-raised-button color="primary" type="submit" [disabled]="form.invalid">
          Guardar rol
        </button>
        <button mat-stroked-button color="warn" type="button" (click)="clearForm()">
          Limpiar
        </button>
      </div>
    </form>
    </mat-card-content>
  </mat-card>

  <loading-overlay *ngIf="isLoading"></loading-overlay>

  <mat-card class="mt-3">
    <mat-card-title>Roles registrados</mat-card-title>
    <mat-divider class="section-divider"></mat-divider>
    <mat-card-content>
    <table mat-table [dataSource]="roles" class="mat-elevation-z1 full-width-table">
      <ng-container matColumnDef="roleName">
        <th mat-header-cell *matHeaderCellDef> Rol </th>
        <td mat-cell *matCellDef="let r"> {{ r.roleName }} </td>
      </ng-container>

      <ng-container matColumnDef="description">
        <th mat-header-cell *matHeaderCellDef> Descripción </th>
        <td mat-cell *matCellDef="let r"> {{ r.description }} </td>
      </ng-container>

      <ng-container matColumnDef="actions">
        <th mat-header-cell *matHeaderCellDef> Acciones </th>
        <td mat-cell *matCellDef="let r">
          <button mat-icon-button color="primary" (click)="editRole(r)">
            <mat-icon>edit</mat-icon>
          </button>
          <button mat-icon-button color="warn" (click)="deleteRole(r)">
            <mat-icon>delete</mat-icon>
          </button>
        </td>
      </ng-container>

      <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
      <tr mat-row *matRowDef="let row; columns: displayedColumns"></tr>
    </table>
    </mat-card-content>
  </mat-card>
</div>
