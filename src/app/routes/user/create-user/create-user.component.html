<mat-card>
  <mat-card-title>Crear usuario</mat-card-title>
  <mat-card-content>
    <form [formGroup]="form" (ngSubmit)="onSubmit()" class="user-form">
      <div class="form-row">
        <mat-form-field appearance="outline">
          <mat-label>Username</mat-label>
          <input matInput formControlName="username" />
        </mat-form-field>
        <mat-form-field appearance="outline">
          <mat-label>Nombre</mat-label>
          <input matInput formControlName="name" />
        </mat-form-field>
      </div>

      <div class="form-row">
        <mat-form-field appearance="outline">
          <mat-label>Email</mat-label>
          <input matInput formControlName="email" />
        </mat-form-field>
        <mat-form-field appearance="outline">
          <mat-label>Contraseña</mat-label>
          <input matInput type="password" formControlName="passwordHash" />
        </mat-form-field>
      </div>

      <div class="form-row">
        <mat-form-field appearance="outline">
          <mat-label>Entidad</mat-label>
          <mat-select formControlName="entitiId">
            <mat-option *ngFor="let entiti of entitis" [value]="entiti.id">
              {{ entiti.entitiName }} ({{ entiti.code }})
            </mat-option>
          </mat-select>
        </mat-form-field>
        <mat-form-field appearance="outline">
          <mat-label>Avatar</mat-label>
          <mat-select formControlName="avatar">
            <mat-option *ngFor="let avatar of avatars" [value]="avatar.value">
              {{ avatar.label }}
            </mat-option>
          </mat-select>
        </mat-form-field>
        <mat-slide-toggle formControlName="isActive">Activo</mat-slide-toggle>
      </div>

      <button mat-raised-button color="primary" type="submit" [disabled]="form.invalid">
        Guardar usuario
      </button>
    </form>
  </mat-card-content>
</mat-card>

<loading-overlay *ngIf="isLoading"></loading-overlay>

<mat-card class="mt-3">
  <mat-card-title>Usuarios registrados</mat-card-title>
  <mat-card-content>
    <table mat-table [dataSource]="users" class="mat-elevation-z1 full-width-table">
      <ng-container matColumnDef="username">
        <th mat-header-cell *matHeaderCellDef> Usuario </th>
        <td mat-cell *matCellDef="let user"> {{ user.username }} </td>
      </ng-container>

      <ng-container matColumnDef="name">
        <th mat-header-cell *matHeaderCellDef> Nombre </th>
        <td mat-cell *matCellDef="let user"> {{ user.name }} </td>
      </ng-container>

      <ng-container matColumnDef="email">
        <th mat-header-cell *matHeaderCellDef> Email </th>
        <td mat-cell *matCellDef="let user"> {{ user.email }} </td>
      </ng-container>

      <ng-container matColumnDef="entitiId">
        <th mat-header-cell *matHeaderCellDef> EntitiId </th>
        <td mat-cell *matCellDef="let user"> {{ user.entitiId }} </td>
      </ng-container>

      <ng-container matColumnDef="isActive">
        <th mat-header-cell *matHeaderCellDef> Activo </th>
        <td mat-cell *matCellDef="let user"> {{ user.isActive ? 'Sí' : 'No' }} </td>
      </ng-container>

      <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
      <tr mat-row *matRowDef="let row; columns: displayedColumns"></tr>
    </table>
  </mat-card-content>
</mat-card>
